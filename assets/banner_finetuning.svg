<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" fill="none" role="img" aria-label="LoRA Fine-Tuning of Llama-3.1-8B">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E1B4B"/>
      <stop offset="0.55" stop-color="#312E81"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#C4B5FD"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.28" r="0.7">
      <stop offset="0" stop-color="#A78BFA" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <style>
      .t { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="320" rx="24" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="320" rx="24" fill="url(#glow)"/>

  <!-- decorative SFT -> DPO -> EVAL flow -->
  <g class="t" font-size="14" font-weight="700" fill="#1E1B4B">
    <g stroke="#C4B5FD" stroke-width="2.5" opacity="0.55">
      <line x1="1000" y1="160" x2="1064" y2="160"/>
      <line x1="1128" y1="160" x2="1192" y2="160"/>
    </g>
    <circle cx="968"  cy="160" r="30" fill="url(#accent)"/>
    <text x="968"  y="165" text-anchor="middle">SFT</text>
    <circle cx="1096" cy="160" r="30" fill="url(#accent)"/>
    <text x="1096" y="165" text-anchor="middle">DPO</text>
    <circle cx="1224" cy="160" r="30" fill="url(#accent)"/>
    <text x="1224" y="165" text-anchor="middle">EVAL</text>
  </g>

  <!-- accent bar -->
  <rect x="80" y="84" width="64" height="6" rx="3" fill="url(#accent)"/>

  <!-- title block -->
  <text x="80" y="148" class="t" font-size="60" font-weight="800" fill="#FFFFFF" letter-spacing="0.5">LoRA Fine-Tuning</text>
  <text x="80" y="192" class="t" font-size="28" font-weight="600" fill="#ECE9FF">Llama-3.1-8B for faithful, cited generation</text>
  <text x="80" y="228" class="t" font-size="18" fill="#C9BEF0">SFT teaches the format, DPO teaches honesty - proven by an independent NLI evaluator.</text>

  <!-- capability pills -->
  <g class="t" font-size="15" font-weight="600" fill="#EDE7FF">
    <rect x="80"  y="256" width="78"  height="34" rx="17" fill="#FFFFFF" fill-opacity="0.1" stroke="#C4B5FD" stroke-opacity="0.55"/>
    <text x="119" y="278" text-anchor="middle">LoRA</text>
    <rect x="170" y="256" width="62"  height="34" rx="17" fill="#FFFFFF" fill-opacity="0.1" stroke="#C4B5FD" stroke-opacity="0.55"/>
    <text x="201" y="278" text-anchor="middle">SFT</text>
    <rect x="244" y="256" width="64"  height="34" rx="17" fill="#FFFFFF" fill-opacity="0.1" stroke="#C4B5FD" stroke-opacity="0.55"/>
    <text x="276" y="278" text-anchor="middle">DPO</text>
    <rect x="320" y="256" width="158" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.1" stroke="#C4B5FD" stroke-opacity="0.55"/>
    <text x="399" y="278" text-anchor="middle">NLI Evaluation</text>
  </g>
</svg>
